name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mysql]"

      - name: Check syntax
        run: python -m py_compile seo_indexer.py

      - name: Verify CLI
        run: |
          google-indexer --version
          google-indexer --help
          google-indexer --status || true

      - name: Run basic smoke test
        run: |
          echo "Basic CLI smoke tests passed on ${{ matrix.os }} / Python ${{ matrix.python-version }}"
